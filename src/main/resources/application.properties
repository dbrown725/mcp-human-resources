spring.application.name=humanresources

# H2 Database
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:hr;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE;MODE=MySQL;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=mypassword

# http://localhost:8081/h2-console
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=true

spring.ai.model.chat=vertexai
spring.ai.vertex.ai.gemini.project-id=${GEMINI_PROJECT_ID}
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.5

google.cloud.storage.bucket.name=${STORAGE_BUCKET_NAME}

# Service account email used for signing GCS URLs.
# Required when running with user credentials (gcloud auth application-default login).
# The authenticated principal must have roles/iam.serviceAccountTokenCreator on this SA.
google.cloud.storage.signing.service-account=${SIGNING_SERVICE_ACCOUNT:}

# Gemini Image Generation Model
# gemini-2.5-flash-image
# or
# gemini-3.1-flash-image-preview
google.gemini.image.generation.model=gemini-3.1-flash-image-preview

# Secondary LLM Configuration
# spring.ai.openai.api-key=${GROQ_API_KEY}
# spring.ai.openai.base-url=https://api.groq.com/openai
# spring.ai.openai.chat.options.model=llama-3.1-8b-instant
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=x-ai/grok-4-fast

# Judge LLM Configuration
# GROQ returning 400 Bad Request for the Judge LLM.
# spring.ai.openai.api-key-judge=${GROQ_API_KEY}
# spring.ai.openai.base-url-judge=https://api.groq.com/openai
# spring.ai.openai.chat.options.model-judge=moonshotai/kimi-k2-instruct-0905

spring.ai.openai.api-key-judge=${GEMINI_API_KEY}
spring.ai.openai.base-url-judge=https://generativelanguage.googleapis.com/v1beta/openai
# spring.ai.openai.chat.options.model-judge=gemini-3.1-pro-preview
spring.ai.openai.chat.options.model-judge=gemini-2.5-flash-lite

# spring.ai.openai.api-key-judge=${OPENROUTER_API_KEY}
# spring.ai.openai.base-url-judge=https://openrouter.ai/api
# spring.ai.openai.chat.options.model-judge=anthropic/claude-3.5-haiku
#alternative model deepseek/deepseek-v3.2

# Embedding Model Configuration
spring.ai.vertex.ai.embedding.project-id=${GEMINI_PROJECT_ID}
spring.ai.vertex.ai.embedding.location=us-central1

spring.ai.mcp.client.stdio.servers-configuration=classpath:mcp-servers.json

# Server port
server.port=8081

server.address=0.0.0.0

# MCP configurations
spring.ai.mcp.server.name=human-resources-server
spring.ai.mcp.server.version=0.0.1
spring.main.banner-mode=off

# Brave Search API Key
brave.search.api.key=${BRAVE_API_KEY}

# Gemini API Key, needed for image generation
gemini.api.key=${GEMINI_API_KEY}

# Logging
# sudo chmod 777  /var/log/spring-boot-applications/mcp-human-resources
# Visit http://localhost:8081/log and look at the logs to see what log levels are currently being logged.
# Look into Actuator for logging, google search: "logback-spring set log level of a spring-boot application with actuator"
logging.level.org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker=ERROR
logging.level.org.springframework.mcp.protocol.tool.SyncMcpToolProvider=ERROR
logging.level.org.springframework.mcp.protocol.sampling.SyncMcpSamplingProvider=ERROR
logging.level.org.springframework.mcp.protocol.elicitation.SyncMcpElicitationProvider=ERROR
logging.level.org.springframework.beans.factory.support.DisposableBeanAdapter=ERROR

spring.elasticsearch.uris=http://localhost:9200
# My local elasticsearch has security disabled. 
#spring.elasticsearch.username=elastic
#spring.elasticsearch.password=

spring.ai.vectorstore.elasticsearch.initialize-schema=true
spring.ai.vectorstore.elasticsearch.dimensions=768
spring.ai.vectorstore.elasticsearch.index-name=hr-policy-rag-index
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Email Configuration
gmail_email_address=${GMAIL_EMAIL_ADDRESS}
gmail_email_app_password=${GMAIL_EMAIL_APP_PASSWORD}

# Actuator Configuration - Keep it simple with just what's needed
management.endpoints.web.exposure.include=prometheus,health,info
management.prometheus.metrics.export.enabled=true

# Metrics Configuration - Essential settings for good data collection
management.metrics.distribution.percentiles-histogram.all=true
management.metrics.enable.all=true

# Prometheus Configuration
management.prometheus.metrics.export.step=5s

# Micrometer Tracing for exemplars
management.tracing.sampling.probability=1.0
management.tracing.enabled=true

# Employee Onboarding Workflow Configuration
# Max retry attempts per workflow step before failing (each step is judged by LLM-as-a-Judge)
onboarding.judge.max-retries=3
# Minimum rating (1-4) from the judge LLM to consider a step as passed
onboarding.judge.success-rating=3

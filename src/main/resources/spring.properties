# Spring Framework low-level properties (read via SpringProperties, NOT application.properties).
# See: https://docs.spring.io/spring-framework/reference/appendix.html#appendix-spring-properties
#
# Workaround for Spring Framework 7.0.6 (Spring Boot 4.0.4) regression (gh-36385):
# 7.0.6 wraps ServletServerHttpResponse's body OutputStream with a non-flushing decorator.
# This breaks SSE (text/event-stream) because MCP's SseServerResponse.send() calls body.flush()
# which becomes a no-op, so events are never sent to the client and the connection hangs.
# Setting this to true restores the previous flush behavior.
# Remove once upgraded to Spring Framework 7.0.7 / Spring Boot 4.0.5 (upstream fix: gh-36537).
spring.http.response.flush.enabled=true
